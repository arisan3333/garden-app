// 収穫グラフSVG生成（気温オーバーレイ付き）
async function generateHarvestChart(harvests, plants, period) {
  if (harvests.length === 0) {
    return `<div style="text-align:center;color:var(--text-light);padding:24px 8px;font-size:13px;">収穫記録がありません</div>`;
  }
  
  // 期間ごとにグルーピング
  const buckets = {}; // key: 期間ラベル, value: 収穫数
  const sortedHarvests = [...harvests].sort((a,b) => new Date(a.date) - new Date(b.date));
  const firstDate = new Date(sortedHarvests[0].date);
  const lastDate = new Date(sortedHarvests[sortedHarvests.length-1].date);
  
  // バケット定義
  const bucketKeys = []; // 順序保持
  if (period === 'week') {
    // 週別：月曜始まり
    const cursor = new Date(firstDate);
    cursor.setHours(0,0,0,0);
    cursor.setDate(cursor.getDate() - ((cursor.getDay() + 6) % 7)); // 月曜
    while (cursor <= lastDate) {
      const key = `${cursor.getMonth()+1}/${cursor.getDate()}`;
      const isoKey = cursor.toISOString().split('T')[0];
      buckets[isoKey] = { label: key, count: 0, start: new Date(cursor), end: null };
      bucketKeys.push(isoKey);
      cursor.setDate(cursor.getDate() + 7);
    }
    // end埋め
    bucketKeys.forEach((k, i) => {
      const next = bucketKeys[i+1];
      buckets[k].end = next 
        ? new Date(new Date(buckets[next].start).getTime() - 86400000)
        : new Date(buckets[k].start.getTime() + 6*86400000);
    });
  } else {
    // 月別
    const cursor = new Date(firstDate.getFullYear(), firstDate.getMonth(), 1);
    while (cursor <= lastDate) {
      const isoKey = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}`;
      buckets[isoKey] = {
        label: `${cursor.getMonth()+1}月`,
        count: 0,
        start: new Date(cursor),
        end: new Date(cursor.getFullYear(), cursor.getMonth()+1, 0)
      };
      bucketKeys.push(isoKey);
      cursor.setMonth(cursor.getMonth() + 1);
    }
  }
  
  // 収穫数をバケットに割り当て
  for (const h of harvests) {
    const d = new Date(h.date);
    for (const k of bucketKeys) {
      const b = buckets[k];
      if (d >= b.start && d <= b.end) {
        b.count += h.details?.count || 1;
        break;
      }
    }
  }
  
  // 気温取得（最初の収穫日〜今日まで）
  const tempStart = firstDate.toISOString().split('T')[0];
  const today = new Date();
  const tempEnd = (today < lastDate ? lastDate : today).toISOString().split('T')[0];
  // 過去気温API は当日含まないことがあるので、念のため2日前まで
  const safeEnd = new Date(today.getTime() - 2*86400000).toISOString().split('T')[0];
  const tempData = await getHistoricalTemperature(tempStart, safeEnd < tempStart ? tempStart : safeEnd);
  
  // バケットごとの平均気温
  const bucketTemps = bucketKeys.map(k => {
    const b = buckets[k];
    if (!tempData) return null;
    const temps = [];
    tempData.dates.forEach((dStr, i) => {
      const d = new Date(dStr);
      if (d >= b.start && d <= b.end && tempData.tempMean[i] != null) {
        temps.push(tempData.tempMean[i]);
      }
    });
    return temps.length > 0 ? temps.reduce((a,b)=>a+b,0) / temps.length : null;
  });
  
  // SVG描画
  const W = 320, H = 200;
  const PAD = { top: 20, right: 36, bottom: 30, left: 32 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;
  const n = bucketKeys.length;
  if (n === 0) return '<div style="padding:24px;text-align:center;color:var(--text-light);">データなし</div>';
  
  const maxCount = Math.max(...bucketKeys.map(k => buckets[k].count), 1);
  const validTemps = bucketTemps.filter(t => t != null);
  const minTemp = validTemps.length > 0 ? Math.min(...validTemps) : 0;
  const maxTemp = validTemps.length > 0 ? Math.max(...validTemps) : 30;
  const tempRange = Math.max(maxTemp - minTemp, 5);
  
  const barW = innerW / n * 0.65;
  const xCenter = (i) => PAD.left + (i + 0.5) * (innerW / n);
  
  // バー（収穫数）
  let barsSvg = '';
  bucketKeys.forEach((k, i) => {
    const v = buckets[k].count;
    const h = v === 0 ? 0 : (v / maxCount) * innerH;
    const x = xCenter(i) - barW/2;
    const y = PAD.top + innerH - h;
    barsSvg += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="#22c55e" rx="3"/>`;
    if (v > 0) {
      barsSvg += `<text x="${xCenter(i)}" y="${y - 3}" text-anchor="middle" font-size="10" fill="#22c55e" font-weight="600">${v}</text>`;
    }
  });
  
  // 折れ線（気温）
  let linePath = '';
  let linePoints = '';
  if (validTemps.length >= 1) {
    const pts = [];
    bucketTemps.forEach((t, i) => {
      if (t != null) {
        const x = xCenter(i);
        const y = PAD.top + innerH - ((t - minTemp) / tempRange) * innerH;
        pts.push({ x, y, t });
      }
    });
    pts.forEach((p, i) => {
      linePath += (i === 0 ? `M ${p.x} ${p.y}` : ` L ${p.x} ${p.y}`);
      linePoints += `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#f59e0b"/>`;
    });
  }
  
  // X軸ラベル
  let xLabels = '';
  bucketKeys.forEach((k, i) => {
    // ラベル多すぎ防止：最大8個まで
    if (n <= 8 || i % Math.ceil(n/8) === 0 || i === n-1) {
      xLabels += `<text x="${xCenter(i)}" y="${H - 8}" text-anchor="middle" font-size="10" fill="#6b7280">${buckets[k].label}</text>`;
    }
  });
  
  // Y軸ラベル（左：収穫数、右：気温）
  let yLabels = '';
  for (let i = 0; i <= 4; i++) {
    const yVal = Math.round(maxCount * (4-i) / 4);
    const y = PAD.top + (innerH * i / 4);
    yLabels += `<text x="${PAD.left - 4}" y="${y + 3}" text-anchor="end" font-size="9" fill="#22c55e">${yVal}</text>`;
    if (validTemps.length > 0) {
      const tVal = (minTemp + tempRange * (4-i) / 4).toFixed(0);
      yLabels += `<text x="${W - PAD.right + 4}" y="${y + 3}" text-anchor="start" font-size="9" fill="#f59e0b">${tVal}°</text>`;
    }
    // グリッド線
    yLabels += `<line x1="${PAD.left}" y1="${y}" x2="${W - PAD.right}" y2="${y}" stroke="#f3f4f6" stroke-width="1"/>`;
  }
  
  const tempNote = !tempData 
    ? '<div style="font-size:11px;color:var(--text-light);margin-top:4px;">※気温データを取得できませんでした</div>'
    : '';
  
  return `
    <div class="harvest-chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        ${yLabels}
        ${barsSvg}
        ${linePath ? `<path d="${linePath}" fill="none" stroke="#f59e0b" stroke-width="2"/>` : ''}
        ${linePoints}
        ${xLabels}
      </svg>
      <div class="chart-legend">
        <div class="item"><span class="swatch" style="background:#22c55e;"></span>収穫数（個）</div>
        ${validTemps.length > 0 ? '<div class="item"><span class="swatch line" style="background:#f59e0b;"></span>平均気温（°C）</div>' : ''}
      </div>
      ${tempNote}
    </div>
  `;
}



// 画像圧縮：1280px以内 / WebP / 品質0.85
async function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1280;
        let { width, height } = img;
        if (width > MAX || height > MAX) {
          if (width > height) {
            height = Math.round(height * (MAX / width));
            width = MAX;
          } else {
            width = Math.round(width * (MAX / height));
            height = MAX;
          }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        // WebP対応チェック、ダメならJPEG
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else canvas.toBlob((b2) => resolve(b2), 'image/jpeg', 0.85);
        }, 'image/webp', 0.85);
      };
      img.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('ファイル読み込み失敗'));
    reader.readAsDataURL(file);
  });
}

// アップロード進捗表示
function showUploadProgress(msg) {
  let el = document.getElementById('uploadProgress');
  if (!el) {
    el = document.createElement('div');
    el.id = 'uploadProgress';
    el.className = 'upload-progress';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.display = 'block';
}
function hideUploadProgress() {
  const el = document.getElementById('uploadProgress');
  if (el) el.style.display = 'none';
}

// 写真追加：カメラ or ギャラリーから
function triggerPhotoCapture(plantId, useCamera) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  if (useCamera) input.capture = 'environment';
  input.style.display = 'none';
  // 複数選択（ギャラリーのみ）
  if (!useCamera) input.multiple = true;
  input.onchange = async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    await handlePhotoFiles(plantId, files);
    document.body.removeChild(input);
  };
  document.body.appendChild(input);
  input.click();
}

async function handlePhotoFiles(plantId, files) {
  const total = files.length;
  let success = 0;
  
  for (let i = 0; i < files.length; i++) {
    showUploadProgress(`保存中… ${i + 1}/${total}`);
    try {
      const blob = await compressImage(files[i]);
      const photo = {
        id: 'photo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        plantId: plantId,
        blob: blob,
        takenAt: new Date().toISOString(),
        memo: '',
        createdAt: new Date().toISOString()
      };
      await dbPut('photos', photo);
      success++;
    } catch (err) {
      console.error('photo save failed', err);
    }
  }
  
  hideUploadProgress();
  
  // 1枚だけのときはメモ入力を任意で促す
  if (success === 1 && total === 1) {
    setTimeout(() => askPhotoMemo(plantId), 100);
  } else {
    showToast(`${success}枚保存しました`);
    if (currentTab === 'photos') renderPlantDetail(plantId);
  }
}

// Blob → ObjectURL（メモリリーク防止のため使用後revokeする）
const photoUrlCache = new Map();
function getPhotoUrl(photo) {
  if (photoUrlCache.has(photo.id)) return photoUrlCache.get(photo.id);
  const url = URL.createObjectURL(photo.blob);
  photoUrlCache.set(photo.id, url);
  return url;
}
function revokeAllPhotoUrls() {
  photoUrlCache.forEach((url) => URL.revokeObjectURL(url));
  photoUrlCache.clear();
}

// 写真タブ描画
async function renderPhotosTab(plant) {
  // 古いObjectURLをクリア（タブ再描画ごとに）
  revokeAllPhotoUrls();
  
  const allPhotos = await dbGetAll('photos');

    .filter(p => p.plantId === plant.id)
    .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

          }).join('')}

      `}
    </div>
  `;
}

// 写真ビューア（拡大表示）
let currentViewerPhotos = [];
let currentViewerIndex = 0;

async function openPhotoViewer(photoId, plantId) {
  const allPhotos = await dbGetAll('photos');
  currentViewerPhotos = allPhotos
    .filter(p => p.plantId === plantId)
    .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  currentViewerIndex = currentViewerPhotos.findIndex(p => p.id === photoId);
  if (currentViewerIndex < 0) currentViewerIndex = 0;
  
  const plant = await dbGet('plants', plantId);
  renderPhotoViewer(plant);
}

function renderPhotoViewer(plant) {
  const photo = currentViewerPhotos[currentViewerIndex];
  if (!photo) return;
  
  const dateStr = new Date(photo.createdAt).toLocaleDateString('ja-JP', { 
    year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' 
  });
  const dayN = Math.floor((new Date(photo.createdAt) - new Date(plant.plantingDate)) / 86400000);
  const total = currentViewerPhotos.length;
  
  let viewer = document.getElementById('photoViewer');
  if (!viewer) {
    viewer = document.createElement('div');
    viewer.id = 'photoViewer';
    viewer.className = 'photo-viewer';
    document.body.appendChild(viewer);
  }
  
  viewer.innerHTML = `
    <div class="viewer-header">
      <button class="close-btn" onclick="closePhotoViewer()">✕</button>
      <div class="info">
        <div>${dateStr} ・ Day ${dayN >= 0 ? dayN : 0}</div>
        <div style="font-size:11px;opacity:0.7;">${currentViewerIndex + 1} / ${total}</div>
      </div>
      <div style="width:32px;"></div>
    </div>
    <div class="viewer-image" id="viewerImageArea">
      <img src="${getPhotoUrl(photo)}" alt="">
    </div>
    <div class="viewer-footer">
      ${photo.memo ? `<div class="memo">${escapeHtml(photo.memo)}</div>` : '<div class="memo" style="opacity:0.5;font-style:italic;">メモなし</div>'}
      <div class="actions">
        ${currentViewerIndex < total - 1 ? `<button onclick="navigatePhoto(1,'${plant.id}')">‹ 前</button>` : '<button disabled style="opacity:0.3;">‹ 前</button>'}
        <button onclick="editPhotoMemo('${photo.id}','${plant.id}')">📝 メモ編集</button>
        <button class="danger" onclick="deletePhoto('${photo.id}','${plant.id}')">🗑 削除</button>
        ${currentViewerIndex > 0 ? `<button onclick="navigatePhoto(-1,'${plant.id}')">次 ›</button>` : '<button disabled style="opacity:0.3;">次 ›</button>'}
      </div>
    </div>
  `;
  viewer.style.display = 'flex';
  
  // スワイプジェスチャー対応
  attachSwipeHandler(viewer, plant);
}

function attachSwipeHandler(viewer, plant) {
  const area = viewer.querySelector('#viewerImageArea');
  if (!area) return;
  let startX = 0;
  area.ontouchstart = (e) => { startX = e.touches[0].clientX; };
  area.ontouchend = (e) => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) < 50) return;
    if (dx > 0 && currentViewerIndex < currentViewerPhotos.length - 1) {
      navigatePhoto(1, plant.id);
    } else if (dx < 0 && currentViewerIndex > 0) {
      navigatePhoto(-1, plant.id);
    }
  };
}

async function navigatePhoto(dir, plantId) {
  const next = currentViewerIndex + dir;
  if (next < 0 || next >= currentViewerPhotos.length) return;
  currentViewerIndex = next;
  const plant = await dbGet('plants', plantId);
  renderPhotoViewer(plant);
}

function closePhotoViewer() {
  const viewer = document.getElementById('photoViewer');
  if (viewer) viewer.style.display = 'none';
}

async function editPhotoMemo(photoId, plantId) {
  const photo = await dbGet('photos', photoId);
  if (!photo) return;
  const content = `
    <h3>📝 メモ編集</h3>
    <div class="form-group">
      <textarea id="photoMemoInput" style="min-height:100px;">${escapeHtml(photo.memo || '')}</textarea>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="closeModal()" style="flex:1;">キャンセル</button>
      <button class="btn" onclick="updatePhotoMemo('${photoId}','${plantId}')" style="flex:1;">保存</button>
    </div>
  `;
  showModal(content);
}

async function updatePhotoMemo(photoId, plantId) {
  const memo = document.getElementById('photoMemoInput')?.value?.trim() || '';
  const photo = await dbGet('photos', photoId);
  if (photo) {
    photo.memo = memo;
    await dbPut('photos', photo);
  }
  closeModal();
  showToast('保存しました');
  // ビューアを再描画
  const plant = await dbGet('plants', plantId);
  // currentViewerPhotosの該当アイテムも更新
  const idx = currentViewerPhotos.findIndex(p => p.id === photoId);
  if (idx >= 0) currentViewerPhotos[idx] = photo;
  renderPhotoViewer(plant);
}

async function deletePhoto(photoId, plantId) {
  if (!confirm('この写真を削除しますか？')) return;
  await dbDelete('photos', photoId);
  // ObjectURL解放
  if (photoUrlCache.has(photoId)) {
    URL.revokeObjectURL(photoUrlCache.get(photoId));
    photoUrlCache.delete(photoId);
  }
  // リストから削除
  currentViewerPhotos = currentViewerPhotos.filter(p => p.id !== photoId);
  showToast('削除しました');
  
  if (currentViewerPhotos.length === 0) {
    closePhotoViewer();
    if (currentTab === 'photos') renderPlantDetail(plantId);
  } else {
    if (currentViewerIndex >= currentViewerPhotos.length) {
      currentViewerIndex = currentViewerPhotos.length - 1;
    }
    const plant = await dbGet('plants', plantId);
    renderPhotoViewer(plant);
  }
}

// 長押しメニュー
async function showPhotoMenu(photoId, plantId) {
  const content = `
    <h3>写真の操作</h3>
    <button class="btn btn-secondary" onclick="closeModal();editPhotoMemo('${photoId}','${plantId}')" style="width:100%;margin-bottom:8px;">📝 メモを編集</button>
    <button class="btn btn-secondary" onclick="closeModal();openPhotoViewer('${photoId}','${plantId}')" style="width:100%;margin-bottom:8px;">🔍 拡大表示</button>
    <button class="btn btn-secondary btn-danger" style="background:var(--danger);width:100%;" onclick="closeModal();deletePhoto('${photoId}','${plantId}')">🗑 削除</button>
  `;
  showModal(content);
}

// HTMLエスケープ
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

// トースト通知
function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = 'position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:white;padding:12px 20px;border-radius:24px;font-size:14px;z-index:10000;transition:opacity 0.3s;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  toast.style.display = 'block';
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => { if (toast) toast.style.display = 'none'; }, 300);
  }, 1800);
}
</script>
